<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Readings in Philippine History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #51513E 0%, #51513E 100%);
            color: #51513E;
        }

        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(68, 41, 19, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 32px 28px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .auth-header h1 {
            font-size: 26px;
            color: #51513E;
            margin-bottom: 6px;
        }

        .auth-header p {
            color: #7A5B47;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #51513E;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #D6DCE1;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #51513E;
            box-shadow: 0 0 0 3px rgba(30, 90, 150, 0.1);
        }

        .password-requirements {
            background: #D6DCE1;
            border-left: 3px solid #D6DCE1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 14px;
            font-size: 12px;
            color: #7A5B47;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }

        .requirement-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .requirement.met .requirement-icon {
            background: #423833;
            color: white;
        }

        .requirement.unmet .requirement-icon {
            background: #D6DCE1;
            color: #D6DCE1;
        }

        .register-btn {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #51513E 0%, #51513E 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(30, 90, 150, 0.3);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #7A5B47;
        }

        .auth-footer a {
            color: #51513E;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: #51513E;
            text-decoration: underline;
        }

        .error-message {
            background: #FCE8E4;
            color: #C55A47;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 14px;
            border-left: 3px solid #C55A47;
            font-size: 13px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #423833;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 14px;
            border-left: 3px solid #423833;
            font-size: 13px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 20px 18px;
            }

            .auth-header h1 {
                font-size: 22px;
            }

            .form-group {
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join our learning community</p>
            </div>

            <form id="registerForm">
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input 
                        type="text" 
                        id="studentId" 
                        placeholder="e.g., STU-2024-001" 
                        required 
                    />
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        placeholder="Your full name" 
                        required 
                    />
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com" 
                        required 
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter a strong password" 
                        required 
                    />
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        placeholder="Confirm your password" 
                        required 
                    />
                </div>

                <div class="password-requirements">
                    <strong style="color: #51513E; display: block; margin-bottom: 8px;">Password Requirements:</strong>
                    <div class="requirement unmet" id="lengthReq">
                        <div class="requirement-icon">âœ“</div>
                        <span>At least 8 characters</span>
                    </div>
                    <div class="requirement unmet" id="uppercaseReq">
                        <div class="requirement-icon">âœ“</div>
                        <span>Contains uppercase letter</span>
                    </div>
                    <div class="requirement unmet" id="lowercaseReq">
                        <div class="requirement-icon">âœ“</div>
                        <span>Contains lowercase letter</span>
                    </div>
                    <div class="requirement unmet" id="numberReq">
                        <div class="requirement-icon">âœ“</div>
                        <span>Contains a number</span>
                    </div>
                </div>

                <button type="submit" class="register-btn" id="registerBtn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? 
                <a href="index.html">Sign in here</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        const studentIdInput = document.getElementById('studentId');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Password requirement checkers
        const lengthReq = document.getElementById('lengthReq');
        const uppercaseReq = document.getElementById('uppercaseReq');
        const lowercaseReq = document.getElementById('lowercaseReq');
        const numberReq = document.getElementById('numberReq');

        function updatePasswordRequirements() {
            const password = passwordInput.value;

            // Check length (8+ characters)
            if (password.length >= 8) {
                lengthReq.classList.remove('unmet');
                lengthReq.classList.add('met');
            } else {
                lengthReq.classList.add('unmet');
                lengthReq.classList.remove('met');
            }

            // Check uppercase
            if (/[A-Z]/.test(password)) {
                uppercaseReq.classList.remove('unmet');
                uppercaseReq.classList.add('met');
            } else {
                uppercaseReq.classList.add('unmet');
                uppercaseReq.classList.remove('met');
            }

            // Check lowercase
            if (/[a-z]/.test(password)) {
                lowercaseReq.classList.remove('unmet');
                lowercaseReq.classList.add('met');
            } else {
                lowercaseReq.classList.add('unmet');
                lowercaseReq.classList.remove('met');
            }

            // Check number
            if (/[0-9]/.test(password)) {
                numberReq.classList.remove('unmet');
                numberReq.classList.add('met');
            } else {
                numberReq.classList.add('unmet');
                numberReq.classList.remove('met');
            }
        }

        passwordInput.addEventListener('input', updatePasswordRequirements);

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const studentId = studentIdInput.value.trim();
            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validation
            if (!studentId) {
                showError('Please enter your student ID');
                return;
            }

            if (!fullName) {
                showError('Please enter your full name');
                return;
            }

            if (!email) {
                showError('Please enter an email address');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Please enter a valid email address');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters long');
                return;
            }

            if (!/[A-Z]/.test(password)) {
                showError('Password must contain at least one uppercase letter');
                return;
            }

            if (!/[a-z]/.test(password)) {
                showError('Password must contain at least one lowercase letter');
                return;
            }

            if (!/[0-9]/.test(password)) {
                showError('Password must contain at least one number');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Disable button and show loading state
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account...';

            try {
                // Sign up with Supabase
                const { data, error } = await window.supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            student_id: studentId
                        }
                    }
                });

                if (error) {
                    showError(error.message || 'Failed to create account');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                    return;
                }

                showSuccess('Account created successfully! Redirecting to home...');
                registerBtn.textContent = 'Account Created!';

                // Redirect to home after 2 seconds
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                showError(error.message || 'An unexpected error occurred');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });

        // Check if user is already logged in
        async function checkAuth() {
            const session = await window.supabaseClient.auth.getSession();
            if (session.data.session) {
                // User already logged in, redirect to home
                window.location.href = 'home.html';
            }
        }

        checkAuth();
    </script>
</body>
</html>
