<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — RPH Interactive Learning Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-background"></div>
        <div class="login-card">
            <div class="login-header">
                <h1>Reset Your Password</h1>
            </div>
            <form id="resetPasswordForm" novalidate>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="password" 
                           placeholder="Enter new password" required />
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" 
                           placeholder="Confirm new password" required />
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="login-button">Reset Password</button>
            </form>

            <div id="resetSuccess" class="success-message hidden">
                <p>✓ Password reset successfully! Redirecting to login...</p>
            </div>

            <div id="resetError" class="error-box hidden">
                <p id="resetErrorText"></p>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="supabase-client.js"></script>
    <script src="db-helpers.js"></script>
    <script>
        const resetForm = document.getElementById('resetPasswordForm');
        const resetSuccess = document.getElementById('resetSuccess');
        const resetError = document.getElementById('resetError');
        const resetErrorText = document.getElementById('resetErrorText');

        // Check if user has valid session (came from email reset link)
        async function checkResetToken() {
            try {
                const supabaseClient = await getSupabaseClient();
                const { data: { user } } = await supabaseClient.auth.getUser();
                
                if (!user) {
                    // No valid reset session, redirect to login
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                    resetErrorText.textContent = 'Invalid reset link or session expired. Redirecting to login...';
                    resetError.classList.remove('hidden');
                    resetForm.classList.add('hidden');
                }
            } catch (error) {
                console.error('Error checking reset token:', error);
                resetErrorText.textContent = 'An error occurred. Please try again.';
                resetError.classList.remove('hidden');
                resetForm.classList.add('hidden');
            }
        }

        // Handle password reset form submission
        if (resetForm) {
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const passwordError = document.getElementById('passwordError');
                const confirmPasswordError = document.getElementById('confirmPasswordError');

                // Reset error messages
                passwordError.textContent = '';
                confirmPasswordError.textContent = '';

                // Validate passwords
                if (!newPassword) {
                    passwordError.textContent = 'Password is required';
                    return;
                }

                if (newPassword.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    return;
                }

                if (newPassword !== confirmPassword) {
                    confirmPasswordError.textContent = 'Passwords do not match';
                    return;
                }

                try {
                    const supabaseClient = await getSupabaseClient();
                    
                    // Update user password
                    const { error } = await supabaseClient.auth.updateUser({ 
                        password: newPassword 
                    });

                    if (error) {
                        resetErrorText.textContent = error.message || 'Error resetting password';
                        resetError.classList.remove('hidden');
                    } else {
                        // Password reset successful
                        resetForm.classList.add('hidden');
                        resetSuccess.classList.remove('hidden');

                        // Clear storage and redirect to login after 3 seconds
                        setTimeout(() => {
                            localStorage.clear();
                            sessionStorage.clear();
                            window.location.href = 'index.html';
                        }, 3000);
                    }
                } catch (error) {
                    resetErrorText.textContent = error.message || 'An error occurred';
                    resetError.classList.remove('hidden');
                }
            });
        }

        // Check reset token on page load
        checkResetToken();
    </script>
</body>
</html>
